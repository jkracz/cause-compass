name: Batch Processing

on:
  schedule:
    - cron: "0 * * * *" # Run every hour
  workflow_dispatch: # Allow manual triggering

env:
  MONGO_USER: ${{ secrets.MONGO_USER }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  BATCH_SIZE: ${{ secrets.BATCH_SIZE }}

jobs:
  process-batch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace dependencies
        run: pnpm run build --filter=@cause/types

      - name: Create temp directory
        run: mkdir -p temp

      - name: Process batch
        working-directory: apps/parsley
        run: pnpm tsx src/scripts/processBatch.ts
        env:
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BATCH_DIR: ${{ github.workspace }}/temp
          BATCH_SIZE: ${{ secrets.BATCH_SIZE }}
      - name: Upload batch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-files-${{ github.run_id }}
          path: temp/
          retention-days: 7 # Keep files for 7 days
